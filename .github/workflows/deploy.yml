name: Deploy photography platform

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install npm dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Install SSH Key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_KEY }}
          known_hosts: 'unimportant-placeholder'
          if_key_exists: replace

      - name: Add host to Known Hosts
        run: |
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy files via rsync
        run: |
          rsync -avz --delete \
            --exclude='/.git/' \
            --exclude='/node_modules/' \
            --exclude='/.env' \
            --exclude='/storage/app/originals/' \
            --exclude='/storage/app/web/' \
            --exclude='/storage/app/thumbnails/' \
            --exclude='/storage/app/zips/' \
            --exclude='/storage/app/public/web/' \
            --exclude='/storage/app/public/thumbnails/' \
            --exclude='/database/database.sqlite' \
            ./ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.DEPLOY_PATH }}

      - name: Run post-deployment commands on server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            # Install Composer dependencies (exclude dev dependencies)
            composer install --no-dev --optimize-autoloader --no-interaction
            # Run database migrations
            php artisan migrate --force
            # Clear and optimize cache
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            # Ensure storage symlink exists
            php artisan storage:link
